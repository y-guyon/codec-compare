<!DOCTYPE html>
<html lang="en">

<head>
  <title>Codec Compare</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" />
  <style>
    :root {
      font-family: Inter, Avenir, Helvetica, Arial, sans-serif;
    }

    * {
      /* See https://material-web.dev/theming/material-theming/. */
      --md-sys-color-primary: #6A67BB;
      --md-sys-color-secondary: #6A67BB;
      --md-sys-color-tertiary: #6A67BB;
      --md-sys-color-surface: #F0F3FA;
      --md-sys-color-background: #FFFFFF;
      --md-sys-color-text: #0A101F;
      --md-menu-container-color: #FFFFFF;
    }

    html,
    body {
      margin: 0;
      display: flex;
      width: 100%;
      height: 100%;
    }

    @media (prefers-color-scheme: light) {
      :root {
        color: var(--md-sys-color-text);
        background: var(--md-sys-color-background);
      }
    }

    #top_level_flex {
      display: flex;
      flex-flow: row nowrap;
      overflow: hidden;
      width: 100%;
    }
    codec-compare {
      min-width: 600px;
      flex: 0;
    }
    #plotly_div {
      min-width: 400px;
      min-height: 400px;
      flex: 1 0;
      /* For plot-overlay to work. */
      position: relative;
    }
    /* Remove the possibility of toggling point clouds on and off in plotly.js.
    /* The user should do that through the codec-compare component. */
    .legendtoggle {
      pointer-events: none;
      cursor: default;
    }
  </style>
  <script>
    // Disable animations and transitions for all Material 3 web components when running tests.
    (function() {
      const isTest = (function() {
        try {
          if (window.__karma__ || (window.parent && window.parent.__karma__) || (window.top && window.top.__karma__)) {
            return true;
          }
        } catch (e) {}
        try {
          if (window.__wd_test_runner__ || (window.parent && window.parent.__wd_test_runner__) || (window.top && window.top.__wd_test_runner__)) {
            return true;
          }
        } catch (e) {}
        if (window.location.pathname.includes('/base/')) {
          return true;
        }
        return false;
      })();

      if (!isTest) return;

      const originalAttachShadow = Element.prototype.attachShadow;
      Element.prototype.attachShadow = function(init) {
        const shadowRoot = originalAttachShadow.call(this, init);
        if (this.tagName.toLowerCase().startsWith('md-')) {
          const style = document.createElement('style');
          style.id = 'disable-m3-animations';
          style.textContent = `
            *, *::before, *::after {
              transition: none !important;
              animation: none !important;
            }
            md-ripple {
              display: none;
            }
          `;
          shadowRoot.appendChild(style);
        }
        return shadowRoot;
      };
    })();
  </script>
  <script type="module" src="/src/codec_compare.ts"></script>
</head>

<body>
  <div id='top_level_flex'>
    <codec-compare></codec-compare>
    <div id='plotly_div'>
      <plot-overlay-ui></plot-overlay-ui>
    </div>
  </div>
</body>

</html>
